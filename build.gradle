plugins {
    id 'java-library'
}


group = 'com.paulzzh'
version = '2.0.0'
archivesBaseName = '!CheckUpdate'

java.toolchain.languageVersion = JavaLanguageVersion.of(8)

repositories {
    maven {
        name = "neoforged"
        url = "https://maven.neoforged.net/releases/"
    }
    maven {
        name = 'Fabric'
        url = 'https://maven.fabricmc.net/'
    }
}

dependencies {
    compileOnly group: 'com.google.code.findbugs', name: 'jsr305', version: '3.0.0'
    implementation group: 'cpw.mods', name: 'modlauncher', version: '8.1.3'
    implementation group: 'org.apache.logging.log4j', name: 'log4j-api', version: '2.17.1'
    implementation group: 'net.fabricmc', name: 'fabric-loader', version: '0.15.7'
}

jar {
    manifest {
        attributes 'FMLCorePluginContainsFMLMod': true
        attributes 'FMLCorePlugin': 'com.paulzzh.checkupdate.CheckUpdate'
    }
}